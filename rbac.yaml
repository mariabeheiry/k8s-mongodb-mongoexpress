apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongo-sa
  namespace: mongo-project

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongo-role
  namespace: mongo-project
rules:
  - apiGroups: [""]
    resources: ["configmaps","secrets","pods","services"]
    verbs: ["get","list","watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongo-rolebinding
  namespace: mongo-project
subjects:
  - kind: ServiceAccount
    name: mongo-sa
roleRef:
  kind: Role
  name: mongo-role
  apiGroup: rbac.authorization.k8s.io